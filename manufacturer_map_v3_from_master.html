<title>OASIS 航空宇宙メーカーマップ v3｜マスター1667社｜地図表示1573社</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0e1a; --panel:#0f1628; --panel2:#131d32;
  --border:#1e2d4a; --border2:#253550;
  --accent:#00d4ff; --accent2:#ff6b35; --accent3:#39ff14;
  --text:#e8f0ff; --muted:#5a7090; --muted2:#3a5070;
  --ok:#39ff14; --ok-bg:rgba(57,255,20,0.08);
  --warn:#ffd60a; --warn-bg:rgba(255,214,10,0.08);
  --ng:#ff4444; --ng-bg:rgba(255,68,68,0.08);
  --cat-cut:#00d4ff;    /* 切削加工 */
  --cat-assy:#39ff14;   /* 組立・塗装 */
  --cat-edm:#c77dff;    /* 放電・特殊 */
  --cat-heat:#ff6b35;   /* 熱処理・表面 */
  --cat-meas:#ffd60a;   /* 測定・検査 */
  --cat-forge:#fb5607;  /* 鍛造・鋳造 */
  --cat-other:#3a86ff;  /* その他 */
  --cat-composite:#8b5cf6; /* 複合材・FRP */
  --cat-material:#f59e0b;  /* 素材・材料 */
  --cat-aero-elec:#06b6d4; /* 航空電子 */
  --cat-surface:#ec4899;   /* 表面処理 */
  --cat-seal:#10b981;      /* シール・ゴム */
  --cat-bearing:#a78bfa;   /* ベアリング */
  --cat-spring:#fb923c;    /* スプリング */
  --cat-fasten:#84cc16;    /* ファスナー */
  --cat-mro:#64748b;       /* MRO */
  --cat-ndt:#22d3ee;
  --cat-design:#94a3b8;
  --cat-trading:#cbd5e1;
  --cat-software:#9ca3af;
  --cat-logistics:#71717a;       /* 非破壊検査 */

  --drawer-w:400px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
header{
  background:var(--panel);border-bottom:2px solid var(--accent);
  padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;
  flex-shrink:0;z-index:1000;position:relative;
}
header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--accent),transparent 60%)}
.h-logo{display:flex;align-items:center;gap:10px}
.h-mark{width:28px;height:28px;background:var(--accent);border-radius:3px;
  font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:500;
  color:var(--bg);display:flex;align-items:center;justify-content:center;letter-spacing:-.5px}
.h-title{font-size:13px;font-weight:700;letter-spacing:.02em}
.h-title span{color:var(--accent)}
.h-base{display:flex;align-items:center;gap:6px;padding:4px 12px;
  background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:3px;
  font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent)}
.h-base svg{flex-shrink:0}
.h-dist-btns{display:flex;gap:4px}
.dist-btn{padding:4px 10px;border-radius:3px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-family:'Share Tech Mono',monospace;
  font-size:10px;cursor:pointer;transition:.15s;white-space:nowrap}
.dist-btn:hover{border-color:var(--accent);color:var(--accent)}
.dist-btn.active{background:rgba(0,212,255,0.12);border-color:var(--accent);color:var(--accent)}
.h-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.h-count{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)}
.h-count strong{color:var(--accent);font-size:16px;margin-right:3px}
.btn-hdr{padding:5px 12px;border-radius:3px;border:1px solid rgba(0,212,255,0.3);
  background:transparent;color:var(--accent);font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:1px;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-hdr:hover{background:rgba(0,212,255,0.1);box-shadow:0 0 8px rgba(0,212,255,0.2)}
.btn-hdr.green{border-color:rgba(57,255,20,.35);color:var(--accent3)}
.btn-hdr.green:hover{background:rgba(57,255,20,.1)}

/* ── MAIN LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── LEFT FILTER PANEL ── */
.filter-panel{
  width:340px;flex-shrink:0;background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.fp-head{
  padding:12px 16px 10px;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  letter-spacing:3px;color:var(--muted);border-bottom:1px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
}
.fp-clear{font-size:9px;color:var(--muted);cursor:pointer;
  padding:2px 6px;border-radius:2px;border:1px solid var(--border);background:transparent;
  font-family:'Share Tech Mono',monospace;letter-spacing:1px;transition:.15s}
.fp-clear:hover{color:var(--accent);border-color:var(--accent)}

.fp-section{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.fp-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--muted);margin-bottom:8px;display:block}

/* カテゴリフィルタ */
.cat-chips{display:flex;flex-wrap:wrap;gap:4px}
.cat-chip{padding:3px 8px;border-radius:3px;border:1px solid;
  font-size:10px;cursor:pointer;transition:.15s;white-space:nowrap;background:transparent}
.cat-chip:hover{opacity:.8}
.cat-chip.off{opacity:.3}

/* 都道府県 */
.pref-select{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border2);
  color:var(--text);padding:6px 8px;border-radius:3px;font-size:11px;
  font-family:'Share Tech Mono',monospace;cursor:pointer;outline:none}
.pref-select:focus{border-color:var(--accent)}

/* 社名・住所 検索（追加） */
.fp-search{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border2);
  color:var(--text);padding:6px 8px;border-radius:3px;font-size:11px;
  font-family:'Share Tech Mono',monospace;outline:none}
.fp-search:focus{border-color:var(--accent)}
.fp-search::placeholder{color:var(--muted);opacity:0.6}

/* 0件時の救済UI（追加） */
.empty-state{padding:24px 16px;color:var(--muted);font-size:11px;line-height:1.6}
.empty-ttl{color:var(--text);font-size:13px;font-weight:700;margin-bottom:6px}
.empty-sub{color:var(--muted);font-size:10px;margin-bottom:18px}
.empty-section{margin-bottom:16px}
.empty-section-ttl{font-family:'Share Tech Mono',monospace;font-size:9px;
  letter-spacing:2px;color:var(--accent);margin-bottom:8px;padding-bottom:4px;
  border-bottom:1px solid rgba(0,212,255,0.2)}
.empty-suggest,.empty-relief{padding:7px 10px;margin-bottom:4px;border-radius:3px;
  border:1px solid var(--border);background:rgba(0,212,255,0.04);cursor:pointer;
  font-size:11px;color:var(--text);transition:.15s}
.empty-suggest:hover,.empty-relief:hover{background:rgba(0,212,255,0.12);border-color:var(--accent)}
.empty-relief{background:rgba(57,255,20,0.04);border-color:rgba(57,255,20,0.2)}
.empty-relief:hover{background:rgba(57,255,20,0.12);border-color:var(--accent3)}

/* 設備有無 */
.equip-toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.equip-tristate{
  display:flex;background:var(--panel2);border:1px solid var(--border);
  border-radius:4px;padding:2px;gap:1px;
}
.equip-tristate button{
  flex:1;background:transparent;border:none;color:var(--muted);
  font-family:inherit;font-size:10px;font-weight:700;letter-spacing:1px;
  padding:5px 4px;cursor:pointer;border-radius:2px;
  transition:all .15s;
}
.equip-tristate button:hover{color:var(--text);background:rgba(255,255,255,.04)}
.equip-tristate button.on[data-st="off"]{background:var(--border2);color:var(--text)}
.equip-tristate button.on[data-st="detail"]{background:rgba(199,125,255,.18);color:#c77dff;box-shadow:0 0 6px rgba(199,125,255,.25) inset}
.equip-tristate button.on[data-st="researched"]{background:rgba(57,255,20,.15);color:#39ff14;box-shadow:0 0 6px rgba(57,255,20,.25) inset}
